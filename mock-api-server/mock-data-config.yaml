# Mock Data Configuration
# ========================
# Controls how many items are generated for each endpoint response.
# Sections are keyed by the api-slug (same as the folder name).
#
# Each endpoint entry under `endpoints` maps to a route path as it appears
# in the OpenAPI spec (e.g. /api/v1/organizations).
#
# Supported keys per endpoint:
#   count:       number of top-level items to generate (for array responses)
#   seed:        optional integer — makes generation deterministic / repeatable
#   fields:      override specific field values for every generated item
#                (use {index} as a placeholder — replaced with 0-based item number)
#   nested:      for responses where a top-level object wraps an array (e.g. {value: [...]})
#                set array_key to the field name that holds the list
#
# Unrecognised slugs or endpoints are silently ignored (falls back to schema-derived defaults).

# ---------------------------------------------------------------------------
# Cisco Meraki Dashboard API  (port 9090)
# ---------------------------------------------------------------------------
cisco-meraki-dashboard-api:
  endpoints:

    /api/v1/organizations:
      count: 3
      fields:
        name: "Acme Corp {index}"
        licensing:
          model: co-term

    /api/v1/organizations/{organizationId}/networks:
      count: 4
      fields:
        name: "Office Network {index}"
        timeZone: America/Los_Angeles
        productTypes: [appliance, switch, wireless]
        tags: [production]

    /api/v1/organizations/{organizationId}/networks/{networkId}/clients:
      count: 10
      fields:
        status: Online
        vlan: "10"
        manufacturer: Apple

# ---------------------------------------------------------------------------
# Microsoft Defender for Endpoint API  (port 9091)
# ---------------------------------------------------------------------------
microsoft-defender-for-endpoint-api:
  endpoints:

    /api/machines:
      count: 5
      nested:
        array_key: value        # response is {"value": [...], "@odata.count": N}
        count_key: "@odata.count"
      fields:
        osPlatform: Windows10
        healthStatus: Active
        riskScore: Medium
        exposureLevel: Low
        rbacGroupName: Engineering

    /api/machines/{id}/logonusers:
      count: 2
      nested:
        array_key: value
        count_key: "@odata.count"
      fields:
        isDomainAdmin: false
        logonTypes: Interactive

    /api/vulnerabilities/machinesVulnerabilities:
      count: 8
      nested:
        array_key: value
        count_key: "@odata.count"
      fields:
        severity: High
        productVendor: Microsoft

